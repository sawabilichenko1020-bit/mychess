<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Mini App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background-color: #1c1c1c; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #myBoard { width: 90vw; max-width: 400px; margin-bottom: 20px; }
        .status-container { text-align: center; font-size: 1.2rem; }
    </style>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>

    <div id="myBoard"></div>
    <div class="status-container">
        <p id="status">Загрузка...</p>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        // Настройка сокетов (пока localhost для тестов)
        // Когда выложишь бэкенд на Render/Railway, замени адрес здесь!
        // Код для автоматического определения комнаты
const urlParams = new URLSearchParams(window.location.search);
// Пробуем достать параметр из ссылки Telegram (?startapp=room123)
let roomId = urlParams.get('tgWebAppStartParam');

// Если ссылки с параметром нет (зашли просто так), создаем общую комнату
if (!roomId) {
    roomId = 'main_lobby';
}

// Подключаемся к серверу в конкретную комнату
var socket = new WebSocket(`wss://chess-server-g42d.onrender.com/ws/${roomId}`);

        function onDrop(source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();
            
            // Отправляем ход сопернику
            socket.send(JSON.stringify(move));
        }

        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Черных' : 'Белых';

            if (game.in_checkmate()) {
                status = 'Мат! ' + moveColor + ' проиграли.';
            } else if (game.in_draw()) {
                status = 'Ничья!';
            } else {
                status = 'Ход ' + moveColor;
                if (game.in_check()) status += ' (Шах!)';
            }

            $status.html(status);
        }

        // Получаем ход от соперника
        socket.onmessage = function(event) {
            var move = JSON.parse(event.data);
            game.move(move);
            board.position(game.fen());
            updateStatus();
        };

        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = ChessBoard('myBoard', config);
        updateStatus();
    </script>
</body>

</html>
